schema_version = "1.4"

[task]
name = "binkbench/bink2-encoder-basic"
description = "Codec engineering - implement a Bink 2 encoder using only the provided decoder."
authors = [
    { name = "Kyle", email = "MaskNinjaSquared@proton.me" }
]
keywords = ["bink", "video", "encoder", "codec engineering"]

[metadata]
difficulty = "hard"
category = "codec-engineering"

[agent]
timeout_sec = 604800.0

[verifier]
timeout_sec = 10800.0
environment_mode = "separate"
network_mode = "no-network"

[environment]
build_timeout_sec = 600.0
network_mode = "public"
os = "linux"

cpus = 8
memory_mb = 8192
storage_mb = 20480
gpus = 0

artifacts = ["/output/encoder"]